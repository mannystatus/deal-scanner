name: Social post to Instagram & Threads

# Posts the top new deals to Instagram and Threads once a day, after the
# ingest run so there's fresh inventory to pick from. Dedup is handled by
# social_post.py itself (social_posts table) — safe to run daily
# indefinitely without reposting.
#
# X is left out of the --platforms list below: X's free API tier no longer
# allows posting (confirmed via a live 402 Payment Required from their API),
# only the paid tier does. To re-enable it once/if that's sorted, add ",x"
# to --platforms in both branches below and make sure the X_* secrets are
# still set.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - DATABASE_URL           Neon Postgres connection string with ?sslmode=require
#   - IG_USER_ID, IG_ACCESS_TOKEN
#     (developers.facebook.com → Meta app, type Business → add the
#      "Instagram" product → your IG account must be a Business/Creator
#      account linked to a Facebook Page → generate a long-lived access
#      token with instagram_basic + instagram_content_publish +
#      pages_show_list scopes → IG_USER_ID via GET /me/accounts ->
#      {page-id}?fields=instagram_business_account)
#   - THREADS_USER_ID, THREADS_ACCESS_TOKEN
#     (same Meta app → add the "Threads" product → run the Threads API's
#      own token flow with threads_basic + threads_content_publish scopes
#      → THREADS_USER_ID comes back from that flow's GET /me call)
#
# Meta long-lived tokens expire (~60 days) and need periodic manual
# refresh — this isn't a set-and-forget forever, unlike the DB connection.

on:
  schedule:
    - cron: "0 13 * * *"   # 1 hour after the ingest.yml run
  workflow_dispatch:
    inputs:
      live:
        description: "Actually post (unchecked = dry run preview only)"
        type: boolean
        default: false

concurrency:
  group: social-post
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Instagram & Threads
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        # Scheduled runs always post live. Manual runs default to a dry-run
        # preview unless you tick "live" when triggering from the Actions tab.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.live }}" = "true" ]; then
            python social_post.py --platforms instagram,threads --limit 3 --min-discount 20 --live
          else
            python social_post.py --platforms instagram,threads --limit 3 --min-discount 20
          fi
