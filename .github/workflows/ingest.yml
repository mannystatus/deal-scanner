name: Reddit ingest

# Runs the worker once a day. Replaces the Render cron job — free for
# public repos, and well inside the 2,000-min/month free quota for private
# repos even at ~15-20 min/cycle (the feed list has grown since this was
# first ~30-60s/cycle).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - DATABASE_URL        Neon Postgres connection string with ?sslmode=require
#   - REDDIT_USER_AGENT   e.g. "deal-scanner/0.1 (contact: you@example.com)"
#   - VAPID_PUBLIC_KEY    Web Push keypair for browser notifications (notifications.py)
#   - VAPID_PRIVATE_KEY   Same keypair — private half, only the worker needs it
#   - VAPID_CLAIM_EMAIL   Contact email for the VAPID JWT claim

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # Lets you trigger a run manually from the Actions tab

concurrency:
  group: reddit-ingest
  cancel-in-progress: false   # If a run is slow, let it finish before the next

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SUBREDDITS: "buildapcsales,GameDeals,AppleDeals,PS5Deals,SwitchDeals,tradingcards,photomarket"
          FETCH_LIMIT: "100"
          LOG_LEVEL: INFO
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CLAIM_EMAIL: ${{ secrets.VAPID_CLAIM_EMAIL }}
        run: python worker.py
