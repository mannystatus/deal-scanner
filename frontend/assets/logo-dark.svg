<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" role="img" aria-labelledby="title desc">
  <title id="title">Hack the Deal — horizontal lockup (dark theme)</title>
  <desc id="desc">Compact horizontal lockup: a small dark icon block with blue dollar sign and green underscore in monospace, followed by the wordmark hack the deal in sans-serif, in a light color for dark backgrounds.</desc>
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, "DejaVu Sans Mono", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
    </style>
  </defs>

  <rect x="10" y="20" width="58" height="44" rx="8" fill="#0E1116"/>
  <text x="39" y="55" text-anchor="middle" class="mono" font-size="22" font-weight="900">
    <tspan fill="#7AA2F7">$</tspan><tspan fill="#A6E3A1">_</tspan>
  </text>

  <text x="82" y="56" class="sans" font-size="32" font-weight="800" fill="#F2F2F3" letter-spacing="-0.5">hack the deal</text>
</svg>
