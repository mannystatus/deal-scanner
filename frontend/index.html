<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>DealScanner – Best Tech, Gaming &amp; Daily Deals | Live Price Drops</title>
    <meta name="description" content="Find the best online deals, discounts, and price drops on tech, gaming, Apple, cameras, trading cards, and daily essentials. DealScanner scans live deals from top retailers so you never miss a sale." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DealScanner – Best Tech, Gaming &amp; Daily Deals" />
    <meta property="og:description" content="Live price drops on tech, gaming, Apple, cameras, trading cards, and daily essentials. Updated continuously from top retailers." />
    <meta property="og:site_name" content="DealScanner" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DealScanner – Best Tech, Gaming &amp; Daily Deals" />
    <meta name="twitter:description" content="Live price drops on tech, gaming, Apple, cameras, and more. Never miss a sale." />

    <!-- Resource hints -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://deal-scanner-api.onrender.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DealScanner",
      "description": "Live deal tracker for tech, gaming, Apple, cameras, trading cards, and daily essentials.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #131316;
        --border: #26262b;
        --text: #e7e7ea;
        --muted: #8a8a93;
        --accent: #00ffd5;
      }
      body { background: var(--bg); color: var(--text); }
    </style>
  </head>
  <body>
    <noscript>
      <div style="max-width:900px;margin:40px auto;padding:0 20px;font-family:sans-serif;color:#e7e7ea;background:#0a0a0b">
        <h1>DealScanner – Best Tech &amp; Daily Deals</h1>
        <p>DealScanner tracks live price drops across tech, gaming, Apple, cameras, trading cards, and everyday essentials. Enable JavaScript to browse hundreds of current deals and discounts.</p>
        <h2>Popular Deal Categories</h2>
        <ul>
          <li>Computer &amp; Laptop Deals</li>
          <li>Gaming Deals</li>
          <li>Apple &amp; iPhone Deals</li>
          <li>Camera &amp; Photography Deals</li>
          <li>Software Deals</li>
          <li>Trading Card Deals</li>
        </ul>
      </div>
    </noscript>
    <div id="root"></div>

    <script src="./config.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>

    <script type="module">
      import React, { useEffect, useState, useCallback } from "react";
      import { createRoot } from "react-dom/client";

      // API_BASE comes from config.js. Localhost and file:// fall back to local dev API.
      const isLocal =
        ["localhost", "127.0.0.1"].includes(location.hostname) ||
        location.protocol === "file:";
      const API_BASE =
        (!isLocal && window.API_BASE) || "http://localhost:8000";

      const CATEGORIES = [
        { id: "", label: "All" },
        { id: "computers", label: "Computers" },
        { id: "gaming", label: "Gaming" },
        { id: "apple", label: "Apple" },
        { id: "cameras", label: "Cameras" },
        { id: "software", label: "Software" },
        { id: "trading_cards", label: "Trading Cards" },
      ];

      const AFFILIATE_PICKS = [
        {
          label: "Essentials",
          items: [
            { title: "Amazon Basics AA Batteries (48-Pack)", url: "https://amzn.to/4oDQnXV" },
            { title: "Anker Nano 45W GaN USB-C Charger", url: "https://amzn.to/4e9BE23" },
            { title: "Amazon Basics 9V Batteries (8-Pack)", url: "https://amzn.to/3SDVZ8p" },
            { title: "Drift Teak Scented Reed Diffuser", url: "https://amzn.to/4eUZTT2" },
            { title: "Anker 65W 3-Port GaN USB-C Charger", url: "https://amzn.to/4vZU3FF" },
            { title: "DASH Fresh Pop Air Popcorn Maker", url: "https://amzn.to/3QW80We" },
            { title: "Owala FreeSip 32oz Insulated Water Bottle", url: "https://amzn.to/43NrI9G" },
            { title: "GOLDEN HOUR Ultra-Thin Digital Watch", url: "https://amzn.to/4ezIAWq" },
            { title: "Sun Bum SPF 50 Sunscreen Lotion", url: "https://amzn.to/4vpP55i" },
            { title: "Sun Bum Hair Care Travel Kit", url: "https://amzn.to/3SnfUbB" },
            { title: "Sun Bum SPF 40 Cooling Sunscreen Stick", url: "https://amzn.to/4eUT189" },
            { title: "chubbycable 240W USB-C Charging Cable", url: "https://amzn.to/4a7ogKE" },
            { title: "chubbycable 240W USB-C Cables 2-Pack", url: "https://amzn.to/4oZ3T8J" },
            { title: "Salt & Stone Aluminum-Free Deodorant", url: "https://amzn.to/4xHfPQg" },
            { title: "Salt & Stone Body Wash", url: "https://amzn.to/4eFInRx" },
            { title: "Olay Super Serum Body Wash", url: "https://amzn.to/4oBYfcc" },
          ],
        },
        {
          label: "Tech",
          items: [
            { title: "PICTRON U200 Handheld LED Ring Light Rig", url: "https://amzn.to/4vsE9DW" },
            { title: "Google Pixel 10a 128GB", url: "https://amzn.to/4aHWLr8" },
            { title: "Insta360 X5 8K 360° Action Camera", url: "https://amzn.to/4fS5x9w" },
            { title: "PNY NVIDIA GeForce RTX 5080 Epic-X ARGB", url: "https://amzn.to/4uH15hr" },
            { title: "CORSAIR Vengeance RGB DDR5 32GB 6000MHz", url: "https://amzn.to/4w2anWw" },
            { title: "Amazon eero Pro 7 Wi-Fi 7 Mesh Router", url: "https://amzn.to/4evKUgT" },
            { title: 'INSIGNIA 55" Fire TV 4K Smart TV', url: "https://amzn.to/3QPObzU" },
            { title: "JONSBO D33 White Micro ATX PC Case", url: "https://amzn.to/4vpr7XZ" },
            { title: "Bambu Lab P1S 3D Printer", url: "https://amzn.to/4eTuPmx" },
            { title: "Cork Dual-Sided Desk Mat", url: "https://amzn.to/44lfpkZ" },
            { title: "Baseus 9-in-1 USB-C Dual Monitor Dock", url: "https://amzn.to/4vratXU" },
            { title: "Anker Prime 250W 6-Port GaN Charging Station", url: "https://amzn.to/4oCozCW" },
            { title: "Razer Basilisk V3 Gaming Mouse", url: "https://amzn.to/4evfatP" },
            { title: "SteelSeries Rival 5 Gaming Mouse", url: "https://amzn.to/4grRbNi" },
            { title: "SteelSeries Arctis Nova 7 Wireless Headset", url: "https://amzn.to/4vtFUAW" },
            { title: "Apple iPad mini (A17 Pro) 128GB", url: "https://amzn.to/4oZ39At" },
            { title: "TORRAS MagSafe iPhone 17 Pro Max Case", url: "https://amzn.to/4xHvyi4" },
            { title: "Nintendo Switch OLED w/ White Joy-Con", url: "https://amzn.to/3ScdUmD" },
            { title: "Belkin Switch 2 Grip Case + 30W Power Bank", url: "https://amzn.to/4gxxzaw" },
            { title: "tomtoc Slim Carrying Case for Switch 2", url: "https://amzn.to/4guPO0f" },
            { title: "Anker Prime 14-Port 160W Docking Station", url: "https://amzn.to/3QeVEbH" },
            { title: "Anker 8-in-1 USB-C Dual Monitor Dock", url: "https://amzn.to/44jHjhh" },
            { title: "Samsung 990 PRO 1TB M.2 NVMe SSD", url: "https://amzn.to/3SkcExK" },
            { title: "Insta360 X5 Invisible Dive Case", url: "https://amzn.to/4acrSuM" },
          ],
        },
        {
          label: "Streaming Kits",
          items: [
            { title: "Lume Cube Panel Pro 2.0 RGB Camera Light", url: "https://amzn.to/4eBzj04" },
            { title: "Blue Yeti USB Microphone (Blackout)", url: "https://amzn.to/3QPSECG" },
            { title: "Elgato Stream Deck+", url: "https://amzn.to/3Sku3q1" },
            { title: "Anker PowerConf C200 2K Webcam", url: "https://amzn.to/4xHAljJ" },
            { title: "Belkin MagSafe Magnetic Wireless Car Charger", url: "https://amzn.to/4oNoeh6" },
            { title: "PICTRON U200 Handheld LED Ring Light Rig", url: "https://amzn.to/43RwnY7" },
          ],
        },
        {
          label: "Trading Cards",
          items: [
            { title: "2026 Panini FIFA World Cup Sticker Box (50 Packs)", url: "https://amzn.to/4uPaV0T" },
          ],
        },
      ];

      function AffiliateCard({ title, url }) {
        return React.createElement(
          "a",
          {
            href: url,
            target: "_blank",
            rel: "noopener noreferrer sponsored",
            className:
              "rounded-xl p-3 border transition hover:border-[var(--accent)] flex flex-col",
            style: { background: "var(--surface)", borderColor: "var(--border)" },
          },
          React.createElement(
            "span",
            {
              className:
                "text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full self-start",
              style: { background: "rgba(255,153,0,0.12)", color: "#ff9900" },
            },
            "Amazon"
          ),
          React.createElement(
            "p",
            { className: "text-sm font-medium leading-snug mt-2 line-clamp-3 flex-1" },
            title
          ),
          React.createElement(
            "span",
            { className: "text-xs mt-3 inline-block", style: { color: "var(--accent)" } },
            "View deal →"
          )
        );
      }

      function AffiliateSection() {
        return React.createElement(
          "section",
          { className: "max-w-6xl mx-auto px-4 pt-5 pb-1" },
          React.createElement(
            "div",
            { className: "flex items-center justify-between mb-3" },
            React.createElement(
              "h2",
              {
                className: "text-xs font-semibold uppercase tracking-widest",
                style: { color: "var(--muted)" },
              },
              "Our Picks"
            ),
            React.createElement(
              "span",
              { className: "text-[10px]", style: { color: "var(--muted)" } },
              "As an Amazon Associate I earn from qualifying purchases"
            )
          ),
          AFFILIATE_PICKS.map((group) =>
            React.createElement(
              "div",
              { key: group.label, className: "mb-6" },
              React.createElement(
                "p",
                {
                  className: "text-[11px] uppercase tracking-wider mb-2",
                  style: { color: "var(--muted)" },
                },
                group.label
              ),
              React.createElement(
                "div",
                { className: "grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3" },
                group.items.map((item) =>
                  React.createElement(AffiliateCard, {
                    key: item.url,
                    title: item.title,
                    url: item.url,
                  })
                )
              )
            )
          )
        );
      }

      function formatPrice(v, currency = "USD") {
        if (v === null || v === undefined) return null;
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency,
          maximumFractionDigits: 2,
        }).format(Number(v));
      }

      function timeAgo(iso) {
        const diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return `${Math.floor(diff)}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      }

      function DealCard({ deal }) {
        const target = deal.affiliate_url || deal.url;
        return React.createElement(
          "a",
          {
            href: target,
            target: "_blank",
            rel: "noopener noreferrer",
            className:
              "block rounded-xl p-4 border transition hover:border-[var(--accent)]",
            style: {
              background: "var(--surface)",
              borderColor: "var(--border)",
            },
          },
          React.createElement(
            "div",
            { className: "flex items-start justify-between gap-3 mb-2" },
            React.createElement(
              "span",
              {
                className:
                  "text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full",
                style: {
                  background: "rgba(0,255,213,0.08)",
                  color: "var(--accent)",
                },
              },
              deal.category
            ),
            deal.discount_pct
              ? React.createElement(
                  "span",
                  {
                    className: "text-xs font-bold",
                    style: { color: "var(--accent)" },
                  },
                  `${Math.round(deal.discount_pct)}% off`
                )
              : null
          ),
          React.createElement(
            "h3",
            { className: "font-medium leading-snug mb-3 line-clamp-2" },
            deal.title
          ),
          React.createElement(
            "div",
            { className: "flex items-baseline gap-2 mb-3" },
            deal.deal_price !== null
              ? React.createElement(
                  "span",
                  { className: "text-xl font-semibold" },
                  formatPrice(deal.deal_price, deal.currency)
                )
              : React.createElement(
                  "span",
                  {
                    className: "text-sm",
                    style: { color: "var(--muted)" },
                  },
                  "See deal"
                ),
            deal.original_price !== null
              ? React.createElement(
                  "span",
                  {
                    className: "text-sm line-through",
                    style: { color: "var(--muted)" },
                  },
                  formatPrice(deal.original_price, deal.currency)
                )
              : null
          ),
          React.createElement(
            "div",
            {
              className: "flex items-center justify-between text-xs",
              style: { color: "var(--muted)" },
            },
            React.createElement(
              "span",
              null,
              deal.merchant || deal.source
            ),
            React.createElement("span", null, timeAgo(deal.posted_at))
          )
        );
      }

      function App() {
        const [deals, setDeals] = useState([]);
        const [categories, setCategories] = useState([]);
        const [activeCat, setActiveCat] = useState("");
        const [minDiscount, setMinDiscount] = useState(0);
        const [search, setSearch] = useState("");
        const [loading, setLoading] = useState(true);
        const [total, setTotal] = useState(0);

        const fetchDeals = useCallback(async () => {
          setLoading(true);
          const params = new URLSearchParams({ limit: "30" });
          if (activeCat) params.set("category", activeCat);
          if (minDiscount > 0) params.set("min_discount", String(minDiscount));
          if (search) params.set("search", search);
          try {
            const r = await fetch(`${API_BASE}/deals?${params}`);
            const data = await r.json();
            setDeals(data.items || []);
            setTotal(data.total || 0);
          } catch (e) {
            console.error(e);
            setDeals([]);
          } finally {
            setLoading(false);
          }
        }, [activeCat, minDiscount, search]);

        useEffect(() => {
          fetch(`${API_BASE}/categories`)
            .then((r) => r.json())
            .then(setCategories)
            .catch(() => setCategories([]));
        }, []);

        useEffect(() => {
          const t = setTimeout(fetchDeals, 200); // debounce search
          return () => clearTimeout(t);
        }, [fetchDeals]);

        useEffect(() => {
          const cat = CATEGORIES.find((c) => c.id === activeCat);
          const catLabel = cat && cat.id ? cat.label : null;
          document.title = catLabel
            ? `Best ${catLabel} Deals Today – ${total.toLocaleString()} Live Price Drops | DealScanner`
            : `DealScanner – Best Tech, Gaming & Daily Deals | ${total.toLocaleString()} Live Price Drops`;
        }, [activeCat, total]);

        return React.createElement(
          "div",
          { className: "min-h-screen" },
          React.createElement(
            "header",
            {
              className: "border-b sticky top-0 z-10 backdrop-blur",
              style: {
                background: "rgba(10,10,11,0.85)",
                borderColor: "var(--border)",
              },
            },
            React.createElement(
              "div",
              { className: "max-w-6xl mx-auto px-4 py-4 flex flex-col gap-3" },
              React.createElement(
                "div",
                { className: "flex items-center justify-between" },
                React.createElement(
                  "h1",
                  { className: "text-xl font-bold tracking-tight" },
                  "deal",
                  React.createElement(
                    "span",
                    { style: { color: "var(--accent)" } },
                    "scanner"
                  )
                ),
                React.createElement(
                  "span",
                  {
                    className: "text-xs",
                    style: { color: "var(--muted)" },
                  },
                  `${total.toLocaleString()} live deals`
                )
              ),
              React.createElement(
                "div",
                { className: "flex flex-wrap items-center gap-2" },
                CATEGORIES.map((c) =>
                  React.createElement(
                    "button",
                    {
                      key: c.id,
                      onClick: () => setActiveCat(c.id),
                      className:
                        "text-xs px-3 py-1.5 rounded-full border transition",
                      style:
                        activeCat === c.id
                          ? {
                              background: "var(--accent)",
                              color: "#000",
                              borderColor: "var(--accent)",
                            }
                          : {
                              borderColor: "var(--border)",
                              color: "var(--text)",
                            },
                    },
                    c.label
                  )
                ),
                React.createElement("input", {
                  type: "search",
                  placeholder: "Search…",
                  value: search,
                  onChange: (e) => setSearch(e.target.value),
                  className:
                    "ml-auto text-sm px-3 py-1.5 rounded-md border bg-transparent outline-none focus:border-[var(--accent)]",
                  style: { borderColor: "var(--border)" },
                }),
                React.createElement(
                  "label",
                  {
                    className: "text-xs flex items-center gap-2",
                    style: { color: "var(--muted)" },
                  },
                  `min ${minDiscount}% off`,
                  React.createElement("input", {
                    type: "range",
                    min: "0",
                    max: "80",
                    step: "5",
                    value: minDiscount,
                    onChange: (e) => setMinDiscount(Number(e.target.value)),
                  })
                )
              )
            )
          ),
          React.createElement(AffiliateSection, null),
          React.createElement(
            "main",
            { className: "max-w-6xl mx-auto px-4 py-6" },
            loading
              ? React.createElement(
                  "p",
                  { style: { color: "var(--muted)" } },
                  "Loading…"
                )
              : deals.length === 0
              ? React.createElement(
                  "p",
                  { style: { color: "var(--muted)" } },
                  "No deals match your filters."
                )
              : React.createElement(
                  "div",
                  {
                    className:
                      "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4",
                  },
                  deals.map((d) =>
                    React.createElement(DealCard, { key: d.id, deal: d })
                  )
                )
          )
        );
      }

      createRoot(document.getElementById("root")).render(
        React.createElement(App)
      );
    </script>
  </body>
</html>
