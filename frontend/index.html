    <style>
      :root {
        --bg: #f5f5f6;
        --surface: #ffffff;
        --border: #e2e2e6;
        --text: #111112;
        --muted: #6b6b74;
        --accent: #00ffd5;
        --accent-text: #007f68;
        --accent-dim: rgba(0, 255, 213, 0.15);
      }

      * { box-sizing: border-box; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* Header network bar */
      .network-bar {
        background: #111112;
        color: #aaa;
        font-size: 11px;
        letter-spacing: 0.04em;
      }
      .network-bar a {
        color: #aaa;
        text-decoration: none;
        transition: color 0.15s;
      }
      .network-bar a:hover { color: var(--accent); }

      /* Main header */
      .site-header {
        background: var(--surface);
        border-bottom: 3px solid var(--accent);
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      }

      /* Logo */
      .logo {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
        text-decoration: none;
        line-height: 1;
      }
      .logo span { color: var(--accent-text); }

      /* Category nav pills */
      .cat-pill {
        font-size: 12px;
        font-weight: 600;
        padding: 5px 14px;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .cat-pill:hover {
        border-color: var(--accent);
        color: var(--accent-text);
      }
      .cat-pill.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
      }

      /* Search input */
      .search-input {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        min-width: 160px;
      }
      .search-input:focus { border-color: var(--accent); }
      .search-input::placeholder { color: var(--muted); }

      /* Deal card */
      .deal-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
      }
      .deal-card:hover {
        box-shadow: 0 6px 24px rgba(0,0,0,0.10);
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .deal-card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
        background: var(--bg);
      }
      .deal-card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }

      /* Category chip on card */
      .cat-chip {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent-text);
      }

      /* Discount badge */
      .discount-badge {
        font-size: 11px;
        font-weight: 800;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--accent);
        color: #000;
        white-space: nowrap;
      }

      /* Price */
      .price-current {
        font-size: 20px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.3px;
      }
      .price-original {
        font-size: 13px;
        color: var(--muted);
        text-decoration: line-through;
      }

      /* Deal title */
      .deal-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
        color: var(--text);
        margin: 8px 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      /* Merchant / time row */
      .deal-meta {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      /* Affiliate card */
      .aff-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.15s, border-color 0.15s;
      }
      .aff-card:hover {
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        border-color: var(--accent);
      }
      .aff-thumb {
        height: 76px;
        margin: -12px -12px 10px -12px;
        border-radius: 8px 8px 0 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .aff-thumb svg { width: 26px; height: 26px; }
      .aff-thumb.icon-star   { background: rgba(255, 153, 0, 0.12); color: #c47500; }
      .aff-thumb.icon-box    { background: var(--accent-dim); color: var(--accent-text); }
      .aff-thumb.icon-cpu    { background: rgba(59, 130, 246, 0.12); color: #2563eb; }
      .aff-thumb.icon-camera { background: rgba(168, 85, 247, 0.12); color: #7c3aed; }
      .aff-thumb.icon-cards  { background: rgba(244, 63, 94, 0.12); color: #be123c; }
      .aff-thumb.icon-sparkle { background: rgba(99, 102, 241, 0.12); color: #4f46e5; }
      .aff-thumb.icon-heart  { background: rgba(220, 38, 38, 0.12); color: #dc2626; }

      .aff-badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(255, 153, 0, 0.12);
        color: #c47500;
        align-self: flex-start;
      }
      .aff-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
        margin-top: 8px;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .aff-cta {
        font-size: 11px;
        font-weight: 700;
        color: var(--accent-text);
        margin-top: 10px;
        letter-spacing: 0.02em;
      }

      /* Section heading */
      .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      /* Divider accent */
      .section-title-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .section-title-bar::after {
        content: '';
        flex: 1;
        height: 2px;
        background: var(--border);
        border-radius: 1px;
      }

      /* Discount slider */
      input[type="range"] {
        accent-color: var(--accent);
        cursor: pointer;
      }

      /* Footer */
      .site-footer {
        background: #111112;
        color: #888;
        border-top: 3px solid var(--accent);
      }
      .site-footer a {
        color: var(--accent);
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .site-footer a:hover { opacity: 0.8; }

      /* Loading skeleton */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .skeleton {
        background: var(--border);
        border-radius: 6px;
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>

            { title: "Elgato Stream Deck+", url: "https://amzn.to/3Sku3q1" },
            { title: "Anker PowerConf C200 2K Webcam", url: "https://amzn.to/4xHAljJ" },
            { title: "Belkin MagSafe Magnetic Wireless Car Charger", url: "https://amzn.to/4oNoeh6" },
            { title: "PICTRON U200 Handheld LED Ring Light Rig", url: "https://amzn.to/43RwnY7" },
          ],
        },
        {
          label: "Trading Cards",
          icon: "cards",
          items: [
            { title: "2026 Panini FIFA World Cup Sticker Box (50 Packs)", url: "https://amzn.to/4uPaV0T" },
          ],
        },
        {
          label: "Unique Finds",
          icon: "sparkle",
          items: [
            { title: "Cozeware 9000 BTU Mini Split Air Conditioner — Ductless Heat Pump, 18 SEER2", url: "https://www.amazon.com/dp/B0GYG2359B?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.3TT8AORF75OAR&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.3TT8AORF75OAR_1783052621929" },
            { title: "mqajdv Dog Hair Bow Headbands (3-Pack) — Adjustable Grooming Accessory", url: "https://www.amazon.com/dp/B0FG8HL29D?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.3H73BJH9XKBFC&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.3H73BJH9XKBFC_1783052966543" },
            { title: 'Yoever Smart Watch — 1.57" HD Display, Call/Text, Heart Rate & SpO2 Tracking', url: "https://www.amazon.com/dp/B0GVHKC91D?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.2FZFXRV6SZL6G&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.2FZFXRV6SZL6G_1783052986396" },
            { title: "1 Body 60 Billion Probiotics for Men & Women — 60 Vegan Capsules", url: "https://www.amazon.com/dp/B07CSFLWVJ?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.39J4UJ74IUYS9&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.39J4UJ74IUYS9_1783053002528" },
            { title: "Onforu Smart Bird Feeder with Camera — 2.5K QHD, Solar Powered, AI Identification", url: "https://www.amazon.com/dp/B0G2B9PMQ1?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.J2CQ4P0FI71I&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.J2CQ4P0FI71I_1783053039506" },
            { title: "iFu Mini Electric Screwdriver Set — 90-in-1 Precision Kit with LED Light & 64 Magnetic Bits", url: "https://www.amazon.com/dp/B0CSSXZSKV?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.1QT6MHZIEUHYA&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.1QT6MHZIEUHYA_1783053054652" },
            { title: "Rechargeable Portable Camping Fan — 60-Hour Runtime, 5 Speeds & 3 Lights", url: "https://www.amazon.com/dp/B0GLP1116V?ref=t_ac_view_request_product_image&campaignId=amzn1.campaign.3POK6NZ15OKFF&linkCode=tr1&tag=wisedealsxyz-20&linkId=amzn1.campaign.3POK6NZ15OKFF_1783053067204" },
          ],
        },
        {
          label: "Staff Favorites",
          icon: "heart",
          items: [
            { title: "Apple AirTag (2nd Generation) — 4 Pack", url: "https://amzn.to/4wouD4I" },
          ],
        },
      ];

      function e(tag, props, ...children) {
        return React.createElement(tag, props, ...children);
      }

      const ICON_PROPS = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.5, strokeLinecap: "round", strokeLinejoin: "round" };

      const AFF_ICONS = {
        star: e("svg", ICON_PROPS, e("polygon", { points: "12,2.5 15,9.5 22,10.3 16.8,15.1 18.2,22 12,18.3 5.8,22 7.2,15.1 2,10.3 9,9.5" })),
        box: e(
          "svg", ICON_PROPS,
          e("path", { d: "M3 7l9-4 9 4-9 4-9-4z" }),
          e("path", { d: "M3 7v10l9 4 9-4V7" }),
          e("path", { d: "M12 11v10" })
        ),
        cpu: e(
          "svg", ICON_PROPS,
          e("rect", { x: 6, y: 6, width: 12, height: 12, rx: 2 }),
          e("rect", { x: 9, y: 9, width: 6, height: 6 }),
          e("line", { x1: 9, y1: 2, x2: 9, y2: 6 }),
          e("line", { x1: 15, y1: 2, x2: 15, y2: 6 }),
          e("line", { x1: 9, y1: 18, x2: 9, y2: 22 }),
          e("line", { x1: 15, y1: 18, x2: 15, y2: 22 }),
          e("line", { x1: 2, y1: 9, x2: 6, y2: 9 }),
          e("line", { x1: 2, y1: 15, x2: 6, y2: 15 }),
          e("line", { x1: 18, y1: 9, x2: 22, y2: 9 }),
          e("line", { x1: 18, y1: 15, x2: 22, y2: 15 })
        ),
        camera: e(
          "svg", ICON_PROPS,
          e("path", { d: "M23 7l-7 5 7 5V7z" }),
          e("rect", { x: 1, y: 5, width: 15, height: 14, rx: 2 })
        ),
        cards: e(
          "svg", ICON_PROPS,
          e("rect", { x: 2, y: 4, width: 14, height: 18, rx: 2 }),
          e("rect", { x: 8, y: 2, width: 14, height: 18, rx: 2 })
        ),
        sparkle: e("svg", ICON_PROPS, e("polygon", { points: "12,2 15,9 22,12 15,15 12,22 9,15 2,12 9,9" })),
        heart: e("svg", ICON_PROPS, e("path", { d: "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" })),
      };

      function AffiliateCard({ title, url, icon }) {
        return e(
          "a",
          { href: url, target: "_blank", rel: "noopener noreferrer sponsored", className: "aff-card" },
          e("div", { className: `aff-thumb icon-${icon}` }, AFF_ICONS[icon]),
          e("span", { className: "aff-badge" }, "Amazon"),
          e("p", { className: "aff-title" }, title),
          e("span", { className: "aff-cta" }, "View deal →")
        );
      }

      function AffiliateSection() {
        return e(
          "section",
          { style: { background: "var(--bg)", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)", padding: "24px 0" } },
          e(
            "div",
            { style: { maxWidth: 1152, margin: "0 auto", padding: "0 16px" } },
            e(
              "div",
              { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 } },
              e("span", { className: "section-label" }, "Our Picks"),
              e("span", { style: { fontSize: 10, color: "var(--muted)" } }, "As an Amazon Associate I earn from qualifying purchases")
            ),
            AFFILIATE_PICKS.map((group) =>
              e(
                "div",
                { key: group.label, style: { marginBottom: 20 } },
                e(
                  "div",
                  { className: "section-title-bar" },
                  e("span", { style: { fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.07em", whiteSpace: "nowrap" } }, group.label)
                ),
                e(
                  "div",
                  { style: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 10 } },
                  group.items.map((item) =>
                    e(AffiliateCard, { key: item.url, title: item.title, url: item.url, icon: group.icon })
                  )
                )
              )
            )
          )
        );
      }

      function formatPrice(v, currency = "USD") {
        if (v === null || v === undefined) return null;
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency,
          maximumFractionDigits: 2,
        }).format(Number(v));
      }

      function timeAgo(iso) {
        const diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return `${Math.floor(diff)}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      }

      function DealCard({ deal }) {
        const target = deal.affiliate_url || deal.url;
        return e(
          "a",
          { href: target, target: "_blank", rel: "noopener noreferrer", className: "deal-card" },
          deal.thumbnail_url
            ? e("img", {
                src: deal.thumbnail_url,
                alt: deal.title,
                loading: "lazy",
                onError: (ev) => { ev.currentTarget.style.display = "none"; },
              })
            : null,
          e(
            "div",
            { className: "deal-card-body" },
            e(
              "div",
              { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 } },
              e("span", { className: "cat-chip" }, deal.category),
              deal.discount_pct
                ? e("span", { className: "discount-badge" }, `${Math.round(deal.discount_pct)}% off`)
                : null
            ),
            e("p", { className: "deal-title" }, deal.title),
            e(
              "div",
              { style: { display: "flex", alignItems: "baseline", gap: 8 } },
              deal.deal_price !== null
                ? e("span", { className: "price-current" }, formatPrice(deal.deal_price, deal.currency))
                : e("span", { style: { fontSize: 13, color: "var(--muted)" } }, "See deal"),
              deal.original_price !== null
                ? e("span", { className: "price-original" }, formatPrice(deal.original_price, deal.currency))
                : null
            ),
            e(
              "div",
              { className: "deal-meta" },
              e("span", null, deal.merchant || deal.source),
              e("span", null, timeAgo(deal.posted_at))
            )
          )
        );
      }

      function SkeletonCard() {
        return e(
          "div",
          { style: { background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden" } },
          e("div", { className: "skeleton", style: { height: 160 } }),
          e(
            "div",
            { style: { padding: 14 } },
            e("div", { className: "skeleton", style: { height: 12, width: "40%", marginBottom: 10 } }),
            e("div", { className: "skeleton", style: { height: 14, marginBottom: 6 } }),
            e("div", { className: "skeleton", style: { height: 14, width: "70%", marginBottom: 12 } }),
            e("div", { className: "skeleton", style: { height: 22, width: "35%" } })
          )
        );
      }

      function App() {
        const [deals, setDeals] = useState([]);
        const [activeCat, setActiveCat] = useState("");
        const [minDiscount, setMinDiscount] = useState(0);
        const [search, setSearch] = useState("");
        const [loading, setLoading] = useState(true);
        const [total, setTotal] = useState(0);

        useEffect(() => {
          let cancelled = false;
          const t = setTimeout(async () => {
            setLoading(true);
            const params = new URLSearchParams({ limit: "30" });
            if (activeCat) params.set("category", activeCat);
            if (minDiscount > 0) params.set("min_discount", String(minDiscount));
            if (search) params.set("search", search);
            try {
              const r = await fetch(`${API_BASE}/deals?${params}`);
              const data = await r.json();
              if (!cancelled) {
                setDeals(data.items || []);
                setTotal(data.total || 0);
              }
            } catch (err) {
              console.error(err);
              if (!cancelled) setDeals([]);
            } finally {
              if (!cancelled) setLoading(false);
            }
          }, 200);
          return () => { cancelled = true; clearTimeout(t); };
        }, [activeCat, minDiscount, search]);

        useEffect(() => {
          const cat = CATEGORIES.find((c) => c.id === activeCat);
          const catLabel = cat && cat.id ? cat.label : null;
          document.title = catLabel
            ? `Best ${catLabel} Deals Today – ${total.toLocaleString()} Live Price Drops | DealScanner`
            : `DealScanner – Best Tech, Gaming & Daily Deals | ${total.toLocaleString()} Live Price Drops`;
        }, [activeCat, total]);

        return e(
          "div",
          { style: { minHeight: "100vh", display: "flex", flexDirection: "column" } },

          /* ── Network bar ── */
          e(
            "div",
            { className: "network-bar" },
            e(
              "div",
              { style: { maxWidth: 1152, margin: "0 auto", padding: "6px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" } },
              e("span", null, "Your source for the best deals on the web"),
              e("span", { style: { fontSize: 10 } }, `${total.toLocaleString()} live deals updated continuously`)
            )
          ),

          /* ── Site header ── */
          e(
            "header",
            { className: "site-header" },
            e(
              "div",
              { style: { maxWidth: 1152, margin: "0 auto", padding: "12px 16px" } },

              /* Logo row */
              e(
                "div",
                { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 } },
                e(
                  "a",
                  { href: "/", className: "logo" },
                  e("img", { src: "/assets/logo.svg", alt: "Hack the Deal", style: { height: 32, display: "block" } })
                ),
                e("input", {
                  type: "search",
                  placeholder: "Search deals…",
                  value: search,
                  onChange: (ev) => setSearch(ev.target.value),
                  className: "search-input",
                })
              ),

              /* Category + filter row */
              e(
                "div",
                { style: { display: "flex", flexWrap: "wrap", alignItems: "center", gap: 6 } },
                CATEGORIES.map((c) =>
                  e(
                    "button",
                    {
                      key: c.id,
                      onClick: () => setActiveCat(c.id),
                      className: `cat-pill${activeCat === c.id ? " active" : ""}`,
                    },
                    c.label
                  )
                ),
                e(
                  "label",
                  { style: { display: "flex", alignItems: "center", gap: 6, marginLeft: "auto", fontSize: 11, color: "var(--muted)", fontWeight: 600 } },
                  `Min ${minDiscount}% off`,
                  e("input", {
                    type: "range",
                    min: "0",
                    max: "80",
                    step: "5",
                    value: minDiscount,
                    onChange: (ev) => setMinDiscount(Number(ev.target.value)),
                    style: { width: 80 },
                  })
                )
              )
            )
          ),

          /* ── Affiliate section ── */
          e(AffiliateSection, null),

          /* ── Deals grid ── */
          e(
            "main",
            { style: { maxWidth: 1152, margin: "0 auto", padding: "24px 16px 40px", flex: 1, width: "100%" } },
            e(
              "div",
              { className: "section-title-bar" },
              e("span", { className: "section-label" }, "Latest Deals")
            ),
            loading
              ? e(
                  "div",
                  { style: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 } },
                  Array.from({ length: 9 }).map((_, i) => e(SkeletonCard, { key: i }))
                )
              : deals.length === 0
              ? e(
                  "div",
                  { style: { textAlign: "center", padding: "60px 0", color: "var(--muted)" } },
                  e("p", { style: { fontSize: 15 } }, "No deals match your filters."),
                  e(
                    "button",
                    {
                      onClick: () => { setActiveCat(""); setMinDiscount(0); setSearch(""); },
                      style: { marginTop: 12, fontSize: 13, color: "var(--accent-text)", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" },
                    },
                    "Clear all filters"
                  )
                )
              : e(
                  "div",
                  { style: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 } },
                  deals.map((d) => e(DealCard, { key: d.id, deal: d }))
                )
          ),

          /* ── Footer ── */
          e(
            "footer",
            { className: "site-footer" },
            e(
              "div",
              { style: { maxWidth: 1152, margin: "0 auto", padding: "20px 16px", display: "flex", flexWrap: "wrap", alignItems: "center", justifyContent: "space-between", gap: 8, fontSize: 12 } },
              e("span", null, "© Hack the Deal 2026. As an Amazon Associate I earn from qualifying purchases."),
              e("a", { href: "/privacy.html" }, "Privacy Policy")
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(e(App));
    </script>
  </body>
</html>
