# Render blueprint — API + frontend + cron worker, all on Render.
#
# Deploy: Render dashboard → New → Blueprint → connect this repo.
# Set env vars in the dashboard after the first deploy:
#   deal-scanner-api    → DATABASE_URL, CORS_ORIGINS
#   deal-scanner-worker → DATABASE_URL
#
# CORS_ORIGINS should be the URL of the deal-scanner-frontend service,
# e.g. https://deal-scanner-frontend.onrender.com

services:
  # ── API ────────────────────────────────────────────────────────────────
  - type: web
    name: deal-scanner-api
    runtime: python
    plan: free            # Bump to "starter" ($7/mo) to eliminate cold starts
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false       # Paste your Neon connection string in the dashboard
      - key: CORS_ORIGINS
        sync: false       # Your frontend URL, e.g. https://deal-scanner-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12"

  # ── Cron worker (RSS ingest every 12 hours) ───────────────────────────
  - type: cron
    name: deal-scanner-worker
    runtime: python
    schedule: "0 */12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        sync: false       # Same Neon connection string as the API
      - key: RSS_USER_AGENT
        value: "deal-scanner/0.1 (contact: mannydotco@gmail.com)"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHON_VERSION
        value: "3.12"

  # ── Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: deal-scanner-frontend
    env: static
    buildCommand: ""      # No build step — plain HTML/JS
    staticPublishPath: frontend
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /index.html
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /config.js
        name: Cache-Control
        value: public, max-age=60, must-revalidate
