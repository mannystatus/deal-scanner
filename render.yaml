# Render blueprint — API + frontend, both on Render.
#
# Deploy: Render dashboard → New → Blueprint → connect this repo.
# Set env vars in the dashboard after the first deploy:
#   deal-scanner-api   → DATABASE_URL, CORS_ORIGINS
#
# CORS_ORIGINS should be the URL of the deal-scanner-frontend service,
# e.g. https://deal-scanner-frontend.onrender.com
# Update it once you know the frontend URL, then redeploy the API.

services:
  # ── API ────────────────────────────────────────────────────────────────
  - type: web
    name: deal-scanner-api
    runtime: python
    plan: free            # Bump to "starter" ($7/mo) to eliminate cold starts
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false       # Paste your Neon connection string in the dashboard
      - key: CORS_ORIGINS
        sync: false       # e.g. https://deal-scanner-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12"

  # ── Frontend (static site) ─────────────────────────────────────────────
  - type: web
    name: deal-scanner-frontend
    env: static
    buildCommand: ""      # No build step — plain HTML/JS
    staticPublishPath: frontend
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /index.html
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /config.js
        name: Cache-Control
        value: public, max-age=60, must-revalidate
